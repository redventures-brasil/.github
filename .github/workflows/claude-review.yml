name: Claude Code (Reusable)

on:
  workflow_call:
    inputs:
      model:
        description: "Modelo Claude a usar"
        type: string
        default: "claude-sonnet-4-20250514"
      max_turns:
        description: "Maximo de turnos de conversacao"
        type: number
        default: 200
      review_language:
        description: "Idioma dos comentarios (pt-BR, en, es)"
        type: string
        default: "pt-BR"
      extra_instructions:
        description: "Instrucoes adicionais especificas do repo"
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
