name: Claude Code (Reusable)

on:
  workflow_call:
    inputs:
      model:
        description: "Modelo Claude a usar"
        type: string
        default: "claude-sonnet-4-6"
      max_turns:
        description: "Maximo de turnos de conversacao"
        type: number
        default: 200
      review_language:
        description: "Idioma das respostas (pt-BR, en, es)"
        type: string
        default: "pt-BR"
      extra_instructions:
        description: "Instrucoes adicionais especificas do repo"
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@26ddc358fe3befff50c5ec2f80304c90c763f6f8 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --append-system-prompt "Você é um agente de engenharia de software da organização Red Ventures Brasil.
            Responda sempre no idioma configurado: pt-BR=português brasileiro | en=inglês | es=espanhol.
            Idioma atual: ${{ inputs.review_language }}.
            Você é capaz de: revisar código de PRs, implementar features/correções, responder perguntas sobre o código e triar issues.
            ${{ inputs.extra_instructions }}"
